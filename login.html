<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

<nav>
  <a class="brand" href="login.html"></a>
</nav>

<main>
  <div class="login-card">
  <h1>Employee Login</h1>
    <div id="loginError" class="login-error" style="display:none;"></div>
    <div class="form-group">
      <label for="empNumber">Employee Number</label>
      <input type="number" id="empNumber" placeholder="Example: 201" maxlength="3" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="4-digit password" maxlength="4" />
    </div>
    <button class="btn-login" onclick="handleLogin()">Log In</button>
    <a href="register.html" class="login-link">Don't have an account? Create one</a>
  </div>
</main>

<script src="auth.js"></script>
<script>
  if (getSession()) window.location.href = 'index.html';

  async function handleLogin() {
    const empNumber = document.getElementById('empNumber').value.trim();
    const password  = document.getElementById('password').value.trim();
    const error     = document.getElementById('loginError');

    if (empNumber.length !== 3 || password.length !== 4) {
      error.textContent = 'Use a 3-digit employee number and 4-digit password.';
      error.style.display = 'block';
      return;
    }

    try {
      const result = await apiRequest('/api/login', {
        method: 'POST',
        body: JSON.stringify({ employee_id: empNumber, password }),
      });
      setSession(result.employee);
      window.location.href = 'index.html';
    } catch (err) {
      error.textContent = err.message;
      error.style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
